<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EinHolzblock - DnD Stuff</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #d4af37;
            font-family: 'Segoe UI', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        h1 { font-size: 3rem; margin-bottom: 10px; text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); }
        p { color: #aaa; margin-bottom: 40px; }

        .portal-container {
            display: flex;
            gap: 20px;
        }

        .portal-button {
            padding: 20px 40px;
            font-size: 1.2rem;
            color: #d4af37;
            text-decoration: none;
            border: 2px solid #d4af37;
            border-radius: 8px;
            transition: all 0.3s ease;
            background: rgba(212, 175, 55, 0.1);
        }

        .portal-button:hover {
            background: #d4af37;
            color: black;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            transform: translateY(-5px);
        }
    </style>
</head>
<body>

    <h1>DnD Stuff</h1>
    <p>Willkommen in der Werkstatt von EinHolzblock</p>

    <div class="portal-container">
        <a href="./Grimorium/" class="portal-button">📜 Zum Grimorium</a>
        <a href="./Masteries/" class="portal-button">⚔️ Zu den Meistereigenschaften</a>
        
        </div>

</body>
</html>
