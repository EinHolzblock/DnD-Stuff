<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D 5.5e Meisterschafts-Guide</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="nav-container">
        <div id="hamburger" onclick="toggleMenu()">☰</div>
        <div id="nav-menu" class="hidden">
            <a href="#">Waffen-Liste</a>
            <a href="#">Kombos & Strategien</a>
            <a href="#">Bastion-Regeln</a>
        </div>
    </div>

    <header>
        <h1>Waffenmeistereien 5.5e</h1>
        <p>Taktische Übersicht für Kämpfer und Abenteurer</p>
    </header>

    <div class="filter-group">
        <input type="text" id="search" placeholder="Waffe suchen..." onkeyup="filterWeapons()">
        <select id="mastery-filter" onchange="filterWeapons()">
            <option value="">Alle Meisterschaften</option>
            <option value="cleave">Spalten (Cleave)</option>
            <option value="nick">Schnitt (Nick)</option>
            <option value="topple">Umwerfen (Topple)</option>
            <option value="vex">Bedrängen (Vex)</option>
            <option value="slow">Verlangsamen (Slow)</option>
            <option value="sap">Schwächen (Sap)</option>
            <option value="push">Stoßen (Push)</option>
            <option value="graze">Streifen (Graze)</option>
        </select>
        <button onclick="filterWeapons()">Filtern</button>
    </div>

    <main class="spell-grid" id="weapon-container">
        <p style="text-align: center; grid-column: 1/-1;">Lade Waffen...</p>
    </main>

    <div id="tooltip" class="hidden"></div>

    <script src="script.js"></script>
</body>
</html>
