<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meisterschaften</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="nav-container">
  <div id="hamburger" onclick="toggleMenu()">☰</div>
  <div id="nav-menu" class="hidden">
    <a href="#" onclick="showPage('masteries')">⚔️ Meisterschaften</a>
  </div>
</div>

<header id="main-header">
  <h1>⚔️ Meisterschaften</h1>

  <div class="filter-group">
    <input type="text" id="searchType" placeholder="Waffenart suchen...">
    <input type="text" id="searchName" placeholder="Waffenname suchen...">
    <input type="text" id="searchMastery" placeholder="Waffenmeistereigenschaft suchen...">

    <select id="filterType">
      <option value="">Alle Waffenarten</option>
      <option value="Melee">Nahkampf</option>
      <option value="Ranged">Fernkampf</option>
    </select>

    <select id="filterMastery">
      <option value="">Alles Meistereigenschaften</option>
    </select>

    <button onclick="resetFilters()">Reset</button>
  </div>
</header>

<main id="masteries-page">
  <div id="weapon-list" class="spell-grid"></div>
</main>

<div id="tooltip" class="hidden"></div>

<script src="script.js"></script>
</body>
</html>
